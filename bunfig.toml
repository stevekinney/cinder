[loader]
".md" = "text"

[run]
bun = true

[test]
preload = ["./scripts/preload.ts"]
# Belt-and-suspenders: even though Playwright specs are named `*.playwright.ts`
# (not Bun's `*.spec.ts`/`*.test.ts` discovery pattern), explicitly ignore
# `packages/testing/tests/` so any future spec file dropped there does not
# accidentally get loaded by Bun's runner.
pathIgnorePatterns = ["packages/testing/tests/**"]

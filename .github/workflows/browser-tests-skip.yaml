name: browser-tests-skip

# Mirror-skip workflow for browser-tests.yaml's required status checks.
#
# `typecheck` and `playwright` (browser-tests.yaml) are required status
# checks on `main` (see docs/validation-topology.md's "Branch protection"
# section). browser-tests.yaml stays path-filtered — it's expensive
# (Chromium install, a full Playwright run) — but a required check with a
# path filter leaves any PR whose changes match NONE of that filter with the
# check stuck at "Expected" forever, permanently blocking the merge.
#
# This workflow triggers on the logical INVERSE of browser-tests.yaml's
# `paths` list and reports the identical `typecheck`/`playwright` job names
# with a job that succeeds immediately, so every PR gets at least one run of
# each required name (sometimes both — accepted; the skip job costs a few
# seconds of runner time — but never neither).
#
# Deliberately uses `paths:` (not `paths-ignore:`) to build that inverse.
# GitHub's own docs reserve `paths-ignore` for exclude-only lists and say to
# use `paths` with `!`-prefixed negations when you need combined
# include/exclude behavior — `paths-ignore` does not officially support
# negation. An earlier version of this workflow mirrored browser-tests.yaml's
# path list verbatim into `paths-ignore` (negations and all); that silently
# broke the one case negation exists for — a PR touching ONLY a doc file
# under a real-trigger directory (e.g. `packages/chat/README.md`) would leave
# BOTH workflows skipped, reopening the exact stuck-required-check trap this
# workflow exists to close.
#
# The inverse is built explicitly, using ONLY documented `paths:` negation
# semantics (later pattern wins, evaluated in order):
#   1. `**` — everything matches, as a starting point.
#   2. Negate every one of browser-tests.yaml's real positive triggers — a
#      file under any of those no longer matches, UNLESS...
#   3. ...it's re-included by one of the doc-pattern entries below, mirroring
#      browser-tests.yaml's OWN trailing negations (`!packages/**/*.md` etc.):
#      those files do NOT trigger the real workflow, so they SHOULD trigger
#      this one.
on:
  pull_request:
    paths:
      - '**'
      - '!packages/components/src/**'
      - '!packages/components/components.json'
      - '!packages/components/package.json'
      - '!packages/components/scripts/**'
      - '!packages/chat/**'
      - '!packages/*/package.json'
      - '!packages/*/scripts/**'
      - '!packages/*/tsconfig*.json'
      - '!packages/commentary/src/**'
      - '!packages/diff/src/**'
      - '!packages/markdown/src/**'
      - '!packages/playground/src/**'
      - '!packages/playground/scripts/**'
      - '!packages/testing/**'
      - '!.github/workflows/browser-tests.yaml'
      - '!package.json'
      - '!bun.lock'
      - '!bun.lockb'
      - '!bunfig.toml'
      - '!.npmrc'
      - '!tsconfig*.json'
      - 'packages/**/*.md'
      - 'packages/**/README*'
      - 'packages/**/CHANGELOG*'

permissions:
  contents: read

concurrency:
  group: browser-tests-skip-${{ github.ref }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Skip (no browser-test-relevant files changed)
        run: echo "browser-tests.yaml's path filter did not match this diff; reporting an instant pass for the required 'typecheck' check."

  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Skip (no browser-test-relevant files changed)
        run: echo "browser-tests.yaml's path filter did not match this diff; reporting an instant pass for the required 'playwright' check."

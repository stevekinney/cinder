name: browser-tests

on:
  pull_request:
    paths:
      - 'packages/**'
      - '.github/workflows/browser-tests.yaml'
      - 'package.json'
      - 'bun.lock'
  push:
    branches:
      - main
    paths:
      - 'packages/**'
      - '.github/workflows/browser-tests.yaml'
      - 'package.json'
      - 'bun.lock'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: browser-tests-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: 1.3.2

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Chromium
        run: bun run --filter='@cinder/testing' install-browsers:ci

      - name: Run Playwright suite
        env:
          CI: 'true'
        run: bun run test:browser

      - name: Upload Playwright HTML report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/testing/playwright-report
          retention-days: 14
          if-no-files-found: warn

      - name: Upload axe JSON results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: axe-results
          path: packages/testing/test-results/axe
          retention-days: 14
          if-no-files-found: warn

      - name: Upload axe summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: axe-summary
          path: packages/testing/test-results/axe-summary.json
          retention-days: 30
          if-no-files-found: warn

      - name: Upload screenshots
        # Always upload: v1 is record-only, so the suite passes even when
        # there's something visually interesting in the screenshots. The
        # 7-day retention bounds the storage cost.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: packages/testing/screenshots
          retention-days: 7
          if-no-files-found: warn

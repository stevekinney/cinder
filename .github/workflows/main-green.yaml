name: main-green

on:
  push:
    branches:
      - main
  schedule:
    - cron: '17 10 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: main-green-${{ github.event_name == 'push' && github.sha || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'push' }}

env:
  BUN_VERSION: 1.3.13

jobs:
  workspace-gates:
    name: workspace-gates
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ runner.arch }}-${{ env.BUN_VERSION }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-${{ runner.arch }}-${{ env.BUN_VERSION }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint workspace
        run: bun run lint

      - name: Lint invariants (cinder)
        run: bun run --filter=@lostgradient/cinder lint:invariants

      - name: Typecheck workspace
        run: bun run typecheck

      - name: Source audits (cinder)
        run: |
          bun run --filter=@lostgradient/cinder aggregator:check
          bun run --filter=@lostgradient/cinder components:check
          bun run --filter=@lostgradient/cinder check:changeset-prerelease-bumps
          bun run --filter=@lostgradient/cinder check:placeholder-docs
          bun run --filter=@lostgradient/cinder validate:workflow
          bun run --filter=@lostgradient/cinder validate:svelte-peer
          bun run --filter=@lostgradient/cinder platform:audit -- --strict
          bun run --filter=@lostgradient/cinder colors:audit -- --strict
          bun run --filter=@lostgradient/cinder tokens:audit -- --strict
          bun run --filter=@lostgradient/cinder build

      - name: Source audits (chat)
        run: |
          bun run --filter=@lostgradient/chat components:check
          bun run --filter=@lostgradient/chat build
          bun run --filter=@lostgradient/chat platform:audit -- --strict
          bun run --filter=@lostgradient/chat colors:audit -- --strict
          bun run --filter=@lostgradient/chat tokens:audit -- --strict

      # The full `bun run test` suite includes @cinder/playground's bundle/route
      # tests (playground-server.test.ts), which bundle the playground FROM
      # SOURCE and resolve private @cinder/* packages plus the public Cinder and
      # Chat packages through built `dist/` subpath exports (e.g.
      # @cinder/markdown/pipeline and @lostgradient/cinder/dropdown/styles).
      # Without a prior build those imports fail to resolve and the bundle
      # tests error.
      # The package list is the SAME one the Playwright runner builds in
      # packages/testing/scripts/start-server.ts and is pinned by the
      # "playground bundle dependency build preflight" test in start-server.test.ts
      # — keep this filter list in sync with that test's `toEqual` assertion.
      - name: Build playground bundle dependencies
        run: >-
          bun run
          --filter=@cinder/diff
          --filter=@cinder/markdown
          --filter=@cinder/editor
          --filter=@cinder/commentary
          --filter=@lostgradient/cinder
          --filter=@lostgradient/chat
          build

      - name: Test non-Cinder workspaces
        run: >-
          bun run
          --filter=@cinder/diff
          --filter=@cinder/markdown
          --filter=@cinder/editor
          --filter=@cinder/commentary
          --filter=@cinder/playground
          --filter=@cinder/testing
          test

      - name: Test Chat package with coverage
        run: bun run --filter=@lostgradient/chat test:coverage

      # Non-blocking trend signal, not a gate: always exits 0 for the RSS
      # number itself (only a genuine test failure inside the canary's own
      # slice would non-zero it). `continue-on-error: true` is belt-and-
      # suspenders on top of that — a flaky sampling hiccup here must never
      # turn main red. The script itself appends its one-line summary to
      # $GITHUB_STEP_SUMMARY (in addition to printing it to the job log), so
      # no output redirection is needed here.
      - name: Memory canary (non-blocking)
        continue-on-error: true
        run: bun run --filter=@lostgradient/cinder test:memory-canary

  component-tests:
    name: component-tests (${{ matrix.chunk }}/4)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        chunk: [1, 2, 3, 4]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ runner.arch }}-${{ env.BUN_VERSION }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-${{ runner.arch }}-${{ env.BUN_VERSION }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test cinder components chunk
        env:
          CINDER_TEST_MODE: full
          CINDER_TEST_FULL_SUITE_CHUNK: ${{ matrix.chunk }}
        run: bun run --filter=@lostgradient/cinder test:changed

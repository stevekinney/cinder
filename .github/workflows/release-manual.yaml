name: release-manual

# Break-glass fallback for releasing `@lostgradient/cinder` if Changesets-driven
# `release.yaml` fails. Triggered manually from the Actions UI. The
# package.json version in `packages/components/` must already be bumped
# before dispatching this workflow — `verify-release-version.ts` enforces
# that the working tree's version matches the input tag.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0). Must match packages/components/package.json#version.'
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      # Check out the exact commit the tag points at. Without `ref`, the
      # workflow would publish from the dispatch ref (default branch),
      # producing provenance metadata that disagrees with the tag.
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ inputs.tag }}
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.13

      - name: Verify tag matches package.json version
        working-directory: packages/components
        env:
          TAG_NAME: ${{ inputs.tag }}
        run: bun run scripts/verify-release-version.ts

  publish-npm:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ inputs.tag }}
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # Break-glass token auth. The first-ever publish of a scoped package
      # cannot use OIDC Trusted Publishing (npm has no package to trust yet),
      # so this writes a token-bearing .npmrc. The `${NODE_AUTH_TOKEN}`
      # placeholder is written literally (quoted heredoc) and expanded by npm
      # at runtime from the publish step's env — the secret is never baked
      # into the file. Once 0.1.0 exists on npm, configure Trusted Publishing
      # and migrate release.yaml back to the OIDC path.
      - name: Configure npm authentication
        shell: bash
        run: |
          echo "NPM_CONFIG_USERCONFIG=$HOME/.npmrc" >> "$GITHUB_ENV"
          cat > "$HOME/.npmrc" <<'EOF'
          registry=https://registry.npmjs.org/
          //registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}
          always-auth=true
          EOF

      - name: Upgrade npm
        run: npm install -g npm@11.5.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify tag matches package.json version
        working-directory: packages/components
        env:
          TAG_NAME: ${{ inputs.tag }}
        run: bun run scripts/verify-release-version.ts

      - name: Install Chromium for consumer validation
        run: bunx playwright install --with-deps chromium

      - name: Validate package artifact
        run: bun run --filter=@lostgradient/cinder validate:consumer

      - name: Check package artifact budget
        run: bun run --filter=@lostgradient/cinder package:weight:check -- --existing-tarball

      # Break-glass publish. The primary release path (release.yaml) is the
      # Changesets/OIDC route; this manual fallback uses NPM_TOKEN as an
      # emergency-only alternative for when that path is unavailable. Do NOT
      # use this workflow for routine releases.
      #
      # Provenance is DISABLED here: `publish:release` runs `npm publish` under
      # Bun, and npm's provenance signing fails under Bun's BoringSSL with
      # ERR_OSSL_NO_DEFAULT_DIGEST. Disabled in BOTH the env below AND
      # package.json#publishConfig.provenance so npm config precedence is
      # irrelevant — they agree. Re-enable provenance only once it's proven to
      # sign cleanly under the publish runtime (needs a Node publish path or a
      # verified Bun/BoringSSL fix).
      #
      # Token rotation: NPM_TOKEN should be rotated at least every 90 days per
      # security policy. The token is a Granular Access Token scoped to the
      # `cinder` package only — never use a full-access automation token.
      - name: Publish to npm
        env:
          NPM_CONFIG_PROVENANCE: 'false'
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun run --filter=@lostgradient/cinder publish:release -- --skip-validation

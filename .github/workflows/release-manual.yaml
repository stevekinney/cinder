name: release-manual

# Break-glass fallback for releasing one of the public packages if Changesets-driven
# `release.yaml` fails. Triggered manually from the Actions UI. The selected
# package manifest must already be versioned, and the package-qualified tag must
# point at that exact commit.

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Public package to publish.'
        required: true
        default: cinder
        type: choice
        options:
          - cinder
          - chat
          - markdown
          - editor
      tag:
        description: 'Package-qualified release tag (for example cinder-v0.16.0, chat-v0.1.0, markdown-v0.1.0, or editor-v0.1.0).'
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      # Check out the exact commit the tag points at. Without `ref`, the
      # workflow would publish from the dispatch ref (default branch),
      # producing provenance metadata that disagrees with the tag.
      - name: Checkout tag
        uses: actions/checkout@v7
        with:
          ref: refs/tags/${{ inputs.tag }}
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Verify tag matches selected package version
        env:
          TAG_NAME: ${{ inputs.tag }}
          PACKAGE_SELECTION: ${{ inputs.package }}
        run: |
          set -euo pipefail
          case "$PACKAGE_SELECTION" in
            cinder) package_directory='packages/components' ;;
            chat) package_directory='packages/chat' ;;
            markdown) package_directory='packages/markdown' ;;
            editor) package_directory='packages/editor' ;;
            *) echo "::error::Unsupported package selection: $PACKAGE_SELECTION"; exit 1 ;;
          esac
          package_version="$(jq -er '.version' "$package_directory/package.json")"
          expected_tag="${PACKAGE_SELECTION}-v${package_version}"
          if [ "$TAG_NAME" != "$expected_tag" ]; then
            echo "::error::Tag $TAG_NAME does not match $expected_tag from $package_directory/package.json."
            exit 1
          fi

  publish-npm:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout tag
        uses: actions/checkout@v7
        with:
          ref: refs/tags/${{ inputs.tag }}
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # Break-glass token auth. The first-ever publish of a scoped package
      # cannot use OIDC Trusted Publishing (npm has no package to trust yet),
      # so this writes a token-bearing .npmrc. The `${NODE_AUTH_TOKEN}`
      # placeholder is written literally (quoted heredoc) and expanded by npm
      # at runtime from the publish step's env — the secret is never baked
      # into the file. Once 0.1.0 exists on npm, configure Chat's Trusted
      # Publisher so release.yaml can publish future versions through OIDC.
      - name: Configure npm authentication
        shell: bash
        run: |
          echo "NPM_CONFIG_USERCONFIG=$HOME/.npmrc" >> "$GITHUB_ENV"
          cat > "$HOME/.npmrc" <<'EOF'
          registry=https://registry.npmjs.org/
          //registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}
          always-auth=true
          EOF

      - name: Upgrade npm
        run: npm install -g npm@11.5.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Select public package
        id: package
        env:
          PACKAGE_SELECTION: ${{ inputs.package }}
        run: |
          set -euo pipefail
          case "$PACKAGE_SELECTION" in
            cinder)
              echo 'name=@lostgradient/cinder' >> "$GITHUB_OUTPUT"
              ;;
            chat)
              echo 'name=@lostgradient/chat' >> "$GITHUB_OUTPUT"
              ;;
            markdown)
              echo 'name=@lostgradient/markdown' >> "$GITHUB_OUTPUT"
              ;;
            editor)
              echo 'name=@lostgradient/editor' >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::Unsupported package selection: $PACKAGE_SELECTION"
              exit 1
              ;;
          esac

      - name: Verify Chat's required Cinder release exists
        if: inputs.package == 'chat'
        shell: bash
        run: |
          set -euo pipefail
          cinder_peer_range="$(jq -er '.peerDependencies["@lostgradient/cinder"]' packages/chat/package.json)"
          if ! published_versions="$(NPM_CONFIG_USERCONFIG=/dev/null npm view "@lostgradient/cinder@${cinder_peer_range}" version --json 2>/dev/null)"; then
            echo "::error::No published @lostgradient/cinder version satisfies Chat's required peer ${cinder_peer_range}. Publish Cinder first."
            exit 1
          fi
          if ! jq -e 'if type == "array" then length > 0 else type == "string" and length > 0 end' <<<"$published_versions" >/dev/null; then
            echo "::error::No published @lostgradient/cinder version satisfies Chat's required peer ${cinder_peer_range}. Publish Cinder first."
            exit 1
          fi
          echo "Published Cinder satisfies Chat peer ${cinder_peer_range}: ${published_versions}"

      - name: Verify Editor's required Cinder and Markdown releases exist
        if: inputs.package == 'editor'
        shell: bash
        run: |
          set -euo pipefail
          for peer in '@lostgradient/cinder' '@lostgradient/markdown'; do
            peer_range="$(jq -er --arg peer "$peer" '.peerDependencies[$peer]' packages/editor/package.json)"
            if ! published_versions="$(NPM_CONFIG_USERCONFIG=/dev/null npm view "${peer}@${peer_range}" version --json 2>/dev/null)"; then
              echo "::error::No published ${peer} version satisfies Editor's required peer ${peer_range}. Publish ${peer} first."
              exit 1
            fi
            if ! jq -e 'if type == "array" then length > 0 else type == "string" and length > 0 end' <<<"$published_versions" >/dev/null; then
              echo "::error::No published ${peer} version satisfies Editor's required peer ${peer_range}. Publish ${peer} first."
              exit 1
            fi
            echo "Published ${peer} satisfies Editor peer ${peer_range}: ${published_versions}"
          done

      - name: Install Chromium for consumer validation
        run: bunx playwright install --with-deps chromium

      # Validate every artifact before publishing any of them. Chat's fixture
      # uses the staged Cinder tarball to prove its required peer contract
      # without falling back to the local workspace package. Markdown has no
      # peer contract with the other two, but is validated here too so the
      # break-glass path never publishes an artifact that hasn't been proven.
      - name: Validate Markdown package artifact
        run: bun run --filter=@lostgradient/markdown validate:consumer

      - name: Validate Cinder package artifact
        run: bun run --filter=@lostgradient/cinder validate:consumer

      - name: Validate Editor package artifact
        run: bun run --filter=@lostgradient/editor validate:consumer

      - name: Validate Chat package artifact
        run: bun run --filter=@lostgradient/chat validate:consumer

      - name: Check selected package artifact budget
        run: bun run --filter=${{ steps.package.outputs.name }} package:weight:check -- --existing-tarball

      # Break-glass publish. The primary release path (release.yaml) is the
      # Changesets/OIDC route; this manual fallback uses NPM_TOKEN as an
      # emergency-only alternative for when that path is unavailable. Do NOT
      # use this workflow for routine releases.
      #
      # Provenance is DISABLED here: `publish:release` runs `npm publish` under
      # Bun, and npm's provenance signing fails under Bun's BoringSSL with
      # ERR_OSSL_NO_DEFAULT_DIGEST. Disabled in BOTH the env below AND
      # package.json#publishConfig.provenance so npm config precedence is
      # irrelevant — they agree. Re-enable provenance only once it's proven to
      # sign cleanly under the publish runtime (needs a Node publish path or a
      # verified Bun/BoringSSL fix).
      #
      # Token rotation: NPM_TOKEN should be rotated at least every 90 days per
      # security policy. Use a Granular Access Token scoped only to the two
      # public packages — never a full-access automation token.
      - name: Publish to npm
        env:
          NPM_CONFIG_PROVENANCE: 'false'
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun run --filter=${{ steps.package.outputs.name }} publish:release -- --skip-validation

name: release-manual

# Break-glass fallback for releasing `cinder` if Changesets-driven
# `release.yaml` fails. Triggered manually from the Actions UI. The
# package.json version in `packages/components/` must already be bumped
# before dispatching this workflow — `verify-release-version.ts` enforces
# that the working tree's version matches the input tag.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0). Must match packages/components/package.json#version.'
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      # Check out the exact commit the tag points at. Without `ref`, the
      # workflow would publish from the dispatch ref (default branch),
      # producing provenance metadata that disagrees with the tag.
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ inputs.tag }}
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.2

      - name: Verify tag matches package.json version
        working-directory: packages/components
        env:
          TAG_NAME: ${{ inputs.tag }}
        run: bun run scripts/verify-release-version.ts

  publish-npm:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ inputs.tag }}
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Configure npm for trusted publishing
        shell: bash
        run: |
          echo "NPM_CONFIG_USERCONFIG=$HOME/.npmrc" >> "$GITHUB_ENV"
          cat > "$HOME/.npmrc" <<'EOF'
          registry=https://registry.npmjs.org/
          always-auth=false
          EOF

      - name: Upgrade npm
        run: npm install -g npm@11.5.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify tag matches package.json version
        working-directory: packages/components
        env:
          TAG_NAME: ${{ inputs.tag }}
        run: bun run scripts/verify-release-version.ts

      - name: Validate package artifact
        run: bun run --filter=cinder validate:consumer

      - name: Check package artifact budget
        run: bun run --filter=cinder package:weight:check -- --existing-tarball

      # Break-glass publish. The primary release path (release.yaml) uses npm
      # Trusted Publishing (OIDC) and requires no long-lived token. This manual
      # fallback uses NPM_TOKEN intentionally as an emergency-only alternative
      # for when the Changesets/OIDC primary path is unavailable. Do NOT use
      # this workflow for routine releases. Provenance is still emitted via
      # NPM_CONFIG_PROVENANCE and the `id-token: write` permission on this job.
      #
      # Token rotation: NPM_TOKEN should be rotated at least every 90 days per
      # security policy. The token is a Granular Access Token scoped to the
      # `cinder` package only — never use a full-access automation token.
      - name: Publish to npm
        env:
          NPM_CONFIG_PROVENANCE: 'true'
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun run --filter=cinder publish:release -- --skip-validation

name: release-manual

# Break-glass fallback for releasing `cinder` if Changesets-driven
# `release.yaml` fails. Triggered manually from the Actions UI. The
# package.json version in `packages/components/` must already be bumped
# before dispatching this workflow — `verify-release-version.ts` enforces
# that the working tree's version matches the input tag.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0). Must match packages/components/package.json#version.'
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.2

      - name: Verify tag matches package.json version
        working-directory: packages/components
        env:
          TAG_NAME: ${{ inputs.tag }}
        run: bun run scripts/verify-release-version.ts

  publish-npm:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Configure npm for trusted publishing
        shell: bash
        run: |
          echo "NPM_CONFIG_USERCONFIG=$HOME/.npmrc" >> "$GITHUB_ENV"
          cat > "$HOME/.npmrc" <<'EOF'
          registry=https://registry.npmjs.org/
          always-auth=false
          EOF

      - name: Upgrade npm
        run: npm install -g npm@11.5.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify tag matches package.json version
        working-directory: packages/components
        env:
          TAG_NAME: ${{ inputs.tag }}
        run: bun run scripts/verify-release-version.ts

      - name: Build package
        run: bun run --filter=cinder build

      - name: Publish to npm
        working-directory: packages/components
        env:
          NPM_CONFIG_PROVENANCE: 'true'
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish

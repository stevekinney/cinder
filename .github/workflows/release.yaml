name: release

# Changesets-driven release pipeline for the `@lostgradient/cinder` npm package.
#
# On every push to `main`:
#   - If unreleased changesets exist, the action opens (or updates) a
#     "Version Packages" pull request that bumps `packages/components/package.json`
#     and updates the changelog. Merging that PR re-triggers this workflow,
#     which then publishes to npm through npm Trusted Publishing.
#   - If no changesets are pending, the action enters the publish path. The
#     publish script skips cleanly when the package version already exists on
#     npm.
#
# The publish path validates the package artifact it is about to publish
# (`validate:consumer` + package weight), but it does not rerun the full
# source-validation suite. Source validation is owned by PR CI and main-green;
# the publish path waits for the same-SHA main-green run before publishing.
# Duplicating those checks here makes the release job timeout-prone and turns
# publish into another full test runner instead of an artifact gate.
#
# `workflow_dispatch` exists for manual dry-runs of the same artifact path.

on:
  push:
    branches:
      - main
  # workflow_dispatch is intentionally dry-run only. Real publishes go
  # through merging the "Version Packages" PR into main. If that path
  # breaks, use release-manual.yaml as the break-glass fallback — never
  # publish directly from this workflow on an arbitrary ref.
  workflow_dispatch: {}

permissions:
  actions: write
  checks: read
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Version or publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # actions/setup-node writes a .npmrc with _authToken=${NODE_AUTH_TOKEN}.
      # Override it before the npm upgrade so npm never sends an empty or
      # undefined Authorization header on the OIDC publish path.
      - name: Configure npm for trusted publishing
        shell: bash
        run: |
          echo "NPM_CONFIG_USERCONFIG=$HOME/.npmrc" >> "$GITHUB_ENV"
          cat > "$HOME/.npmrc" <<'EOF'
          registry=https://registry.npmjs.org/
          always-auth=false
          EOF

      - name: Upgrade npm
        run: npm install -g npm@11.5.1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Cheap pre-check so artifact validation only runs on the publish path.
      # Pending changesets mean this push will just open/
      # update the Version Packages PR (no publish) — that PR's own commits
      # already passed PR CI and main-green, so there is no package artifact to
      # validate here. Excludes .changeset/README.md, which is not a changeset.
      - name: Detect pending changesets
        id: pending-changesets
        run: |
          if [ -n "$(find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' -print -quit)" ]; then
            echo "pending=true" >> "$GITHUB_OUTPUT"
          else
            echo "pending=false" >> "$GITHUB_OUTPUT"
          fi

      # Runs on EVERY push, independent of the artifact-validation decision
      # below. The ignored-package changeset check must not wait for the publish
      # path: an illegal changeset for an ignored package (e.g.
      # @cinder/playground) would otherwise sit unconsumed while
      # `changesets/action` keeps re-opening the Version Packages PR, instead
      # of failing here with the actionable error.
      - name: Guard against ignored-package changesets
        if: github.event_name == 'push'
        run: bun run --filter=@lostgradient/cinder validate:release-workflow

      - name: Guard changeset bump policy
        if: github.event_name == 'push'
        run: bun run --filter=@lostgradient/cinder check:changeset-prerelease-bumps

      # Chromium is only needed by validate:consumer — gate it identically so
      # the no-publish path skips the browser download too.
      - name: Install Chromium for consumer validation
        if: github.event_name != 'push' || steps.pending-changesets.outputs.pending == 'false'
        run: bunx playwright install --with-deps chromium

      - name: Validate package artifact
        if: github.event_name != 'push' || steps.pending-changesets.outputs.pending == 'false'
        run: bun run --filter=@lostgradient/cinder validate:consumer

      - name: Create Release Pull Request or publish to npm
        id: changesets
        if: github.event_name == 'push'
        uses: changesets/action@v1
        with:
          version: bun run changeset:version
          setupGitUser: true
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Pull request events created by GITHUB_TOKEN require manual approval.
      # Explicit workflow dispatches are the supported exception, so bootstrap
      # validation against the generated branch instead of requiring a human
      # to push an empty commit to the Version Packages pull request.
      - name: Dispatch Version Packages pull request validation
        if: steps.changesets.outputs.pullRequestNumber != ''
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_PULL_REQUEST_NUMBER: ${{ steps.changesets.outputs.pullRequestNumber }}
        run: |
          set -euo pipefail
          release_branch="$(gh pr view "$RELEASE_PULL_REQUEST_NUMBER" --json headRefName --jq '.headRefName')"

          gh workflow run unit-tests.yaml --ref "$release_branch"
          gh workflow run browser-tests.yaml --ref "$release_branch"
          gh workflow run changeset-guard.yaml --ref "$release_branch"
          gh workflow run deploy-playground.yaml --ref "$release_branch" -f environment=preview

      - name: Wait for main-green source validation
        if: github.event_name == 'push' && steps.changesets.outputs.hasChangesets == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          main_green_run_id=''
          for attempt in 1 2 3 4 5; do
            main_green_run_id="$(gh run list \
              --workflow main-green.yaml \
              --commit "$GITHUB_SHA" \
              --event push \
              --json databaseId \
              --limit 1 \
              --jq '.[0].databaseId // ""')"

            if [ -n "$main_green_run_id" ]; then
              break
            fi

            echo "main-green run for $GITHUB_SHA is not visible yet (attempt $attempt/5)."
            sleep 30
          done

          if [ -z "$main_green_run_id" ]; then
            echo "::error::No main-green push run found for $GITHUB_SHA; refusing to publish without source validation."
            exit 1
          fi

          gh run watch "$main_green_run_id" --exit-status --interval 30

      - name: Check validated package artifact budget
        if: github.event_name != 'push' || steps.changesets.outputs.hasChangesets == 'false'
        run: bun run --filter=@lostgradient/cinder package:weight:check -- --existing-tarball

      # Primary publish path: npm Trusted Publishing (OIDC). No long-lived token.
      # npm >= 11.5.1 (installed above) + id-token: write (on this job) + the npm
      # package's Trusted Publisher configured at registry.npmjs.org automatically
      # exchanges the GitHub OIDC token for a publish grant.
      #
      # Provenance is DISABLED to match package.json#publishConfig.provenance
      # (false) — `publish:release` runs `npm publish` under Bun, whose BoringSSL
      # fails provenance signing with ERR_OSSL_NO_DEFAULT_DIGEST. The env and
      # publishConfig agree at false so npm config precedence can't reintroduce
      # the failure. Re-enable provenance in BOTH places only once signing is
      # proven under the publish runtime.
      #
      # If this path breaks and a token-based emergency publish is required, use
      # .github/workflows/release-manual.yaml instead (see CONTRIBUTING.md).
      - name: Publish validated package artifact to npm
        if: github.event_name == 'push' && steps.changesets.outputs.hasChangesets == 'false'
        run: bun run --filter=@lostgradient/cinder publish:release -- --skip-validation
        env:
          NPM_CONFIG_PROVENANCE: 'false'

      # Diagnostic dry-run: publish the same staged tarball that
      # validate:consumer installs into the fixture apps.
      - name: Publish (dry-run)
        if: github.event_name == 'workflow_dispatch'
        run: bun run --filter=@lostgradient/cinder publish:release -- --dry-run --skip-validation

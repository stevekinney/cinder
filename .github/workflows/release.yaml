name: release

# Changesets-driven release pipeline for the `@lostgradient/cinder` npm package.
#
# On every push to `main`:
#   - If unreleased changesets exist, the action opens (or updates) a
#     "Version Packages" pull request that bumps `packages/components/package.json`
#     and updates the changelog. Merging that PR re-triggers this workflow,
#     which then publishes to npm with provenance.
#   - If no changesets are pending, the workflow is a no-op.
#
# `workflow_dispatch` exists for manual dry-runs — see the `dry-run` input.

on:
  push:
    branches:
      - main
  # workflow_dispatch is intentionally dry-run only. Real publishes go
  # through merging the "Version Packages" PR into main. If that path
  # breaks, use release-manual.yaml as the break-glass fallback — never
  # publish directly from this workflow on an arbitrary ref.
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Version or publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.13

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # actions/setup-node writes a .npmrc with _authToken=${NODE_AUTH_TOKEN}.
      # Override it before the npm upgrade so npm never sends an empty or
      # undefined Authorization header on the OIDC publish path.
      - name: Configure npm for trusted publishing
        shell: bash
        run: |
          echo "NPM_CONFIG_USERCONFIG=$HOME/.npmrc" >> "$GITHUB_ENV"
          cat > "$HOME/.npmrc" <<'EOF'
          registry=https://registry.npmjs.org/
          always-auth=false
          EOF

      - name: Upgrade npm
        run: npm install -g npm@11.5.1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate workspace
        run: bun run validate

      - name: Create Release Pull Request or publish to npm
        id: changesets
        if: github.event_name == 'push'
        uses: changesets/action@v1
        with:
          version: bun run changeset:version
          setupGitUser: true
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check validated package artifact budget
        if: github.event_name == 'push' && steps.changesets.outputs.hasChangesets == 'false'
        run: bun run --filter=@lostgradient/cinder package:weight:check -- --existing-tarball

      # Primary publish path: npm Trusted Publishing (OIDC). No long-lived token.
      # npm >= 11.5.1 (installed above) + id-token: write (on this job) + the npm
      # package's Trusted Publisher configured at registry.npmjs.org automatically
      # exchanges the GitHub OIDC token for a publish grant.
      #
      # Provenance is DISABLED to match package.json#publishConfig.provenance
      # (false) — `publish:release` runs `npm publish` under Bun, whose BoringSSL
      # fails provenance signing with ERR_OSSL_NO_DEFAULT_DIGEST. The env and
      # publishConfig agree at false so npm config precedence can't reintroduce
      # the failure. Re-enable provenance in BOTH places only once signing is
      # proven under the publish runtime.
      #
      # If this path breaks and a token-based emergency publish is required, use
      # .github/workflows/release-manual.yaml instead (see CONTRIBUTING.md).
      - name: Publish validated package artifact to npm
        if: github.event_name == 'push' && steps.changesets.outputs.hasChangesets == 'false'
        run: bun run --filter=@lostgradient/cinder publish:release -- --skip-validation
        env:
          NPM_CONFIG_PROVENANCE: 'false'

      # Diagnostic dry-run: publish the same staged tarball that
      # validate:consumer installs into the fixture apps.
      - name: Publish (dry-run)
        if: github.event_name == 'workflow_dispatch'
        run: bun run changeset:publish:dry
